name: Python CI
on:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run Tests
        run: |
          pytest
